version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=curriculo_sedu
      - POSTGRES_USER=curriculo_sedu
      - POSTGRES_PASSWORD=curriculo_sedu
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U curriculo_sedu"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - media_data:/app/media
    environment:
      - DJANGO_DEBUG=True
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      - DOCKER_POSTGRES=1
      - POSTGRES_DB=curriculo_sedu
      - POSTGRES_USER=curriculo_sedu
      - POSTGRES_PASSWORD=curriculo_sedu
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

volumes:
  media_data:
  postgres_data:

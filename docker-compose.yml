services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_DB=curriculo_sedu
      - POSTGRES_USER=curriculo_sedu
      - POSTGRES_PASSWORD=curriculo_sedu
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U curriculo_sedu"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - media_data:/app/media
    environment:
      - DJANGO_DEBUG=True
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      - DOCKER_POSTGRES=1
      - POSTGRES_DB=curriculo_sedu
      - POSTGRES_USER=curriculo_sedu
      - POSTGRES_PASSWORD=curriculo_sedu
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      # Integração de comentários com o Microsoft Teams (grupo GECEB) — vazias
      # por padrão (integração desligada/no-op); preencher via arquivo .env
      # (não commitado) quando a TI da SEDU liberar o cadastro no Azure AD.
      - TEAMS_WEBHOOK_URL=${TEAMS_WEBHOOK_URL:-}
      - TEAMS_CLIENT_ID=${TEAMS_CLIENT_ID:-}
      - TEAMS_CLIENT_SECRET=${TEAMS_CLIENT_SECRET:-}
      - TEAMS_TENANT_ID=${TEAMS_TENANT_ID:-}
      - TEAMS_TEAM_ID=${TEAMS_TEAM_ID:-}
      - TEAMS_CHANNEL_ID=${TEAMS_CHANNEL_ID:-}
      - TEAMS_MEMBROS_AUTORIZADOS=${TEAMS_MEMBROS_AUTORIZADOS:-}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  teams_sync:
    build: .
    restart: unless-stopped
    volumes:
      - .:/app
      - media_data:/app/media
    environment:
      - DOCKER_POSTGRES=1
      - POSTGRES_DB=curriculo_sedu
      - POSTGRES_USER=curriculo_sedu
      - POSTGRES_PASSWORD=curriculo_sedu
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - TEAMS_WEBHOOK_URL=${TEAMS_WEBHOOK_URL:-}
      - TEAMS_CLIENT_ID=${TEAMS_CLIENT_ID:-}
      - TEAMS_CLIENT_SECRET=${TEAMS_CLIENT_SECRET:-}
      - TEAMS_TENANT_ID=${TEAMS_TENANT_ID:-}
      - TEAMS_TEAM_ID=${TEAMS_TEAM_ID:-}
      - TEAMS_CHANNEL_ID=${TEAMS_CHANNEL_ID:-}
      - TEAMS_MEMBROS_AUTORIZADOS=${TEAMS_MEMBROS_AUTORIZADOS:-}
    depends_on:
      db:
        condition: service_healthy
    # Sem credenciais Graph configuradas, o comando só avisa e sai — seguro
    # deixar este serviço sempre rodando, mesmo antes da TI liberar o Azure AD.
    command: >
      sh -c "while true; do python manage.py sincronizar_teams; sleep 180; done"

volumes:
  media_data:
  postgres_data:
